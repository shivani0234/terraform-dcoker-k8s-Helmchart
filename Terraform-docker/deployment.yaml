apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-nginx-deployment
spec:
  replicas: 2

  selector:
    matchLabels:
      app: my-nginx

  template:
    metadata:
      labels:
        app: my-nginx

    spec:
      containers:
        - name: my-nginx
          image: my-nginx-custom:latest
          imagePullPolicy: Never

          ports:
            - containerPort: 80

---
apiVersion: v1
kind: Service
metadata:
  name: my-nginx-service
spec:
  type: NodePort

  selector:
    app: my-nginx

  ports:
    - name: http   # ✅ FIX: add name (important for clarity & best practice)
      port: 80
      targetPort: 80
      nodePort: 30007